<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <header class="flex p-8 border-b-2 bg-gray-50">
      <div class="flex items-center justify-center">
        <h1 class="text-2xl font-bold">UTVECKLAR AKADEMIN</h1>
      </div>
      <div class="flex justify-end w-full ml-auto">
        <a class="mx-4 font-normal text-gray-900 hover:text-gray-700" href="#">Home</a>
        <a class="mx-4" href="#">About</a>
        <a class="mx-4" href="#">Contact</a>
        <div class="relative ml-3">
          <button type="button" class="flex text-sm bg-white rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            <span class="sr-only">Open user menu</span>
            <img class="w-8 h-8 rounded-full" src="<https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80>" alt="" />
          </button>
        </div>
      </div>
    </header>
    <div class="container relative mx-auto mt-10">
      <div class="absolute top-0 right-5 hidden" id="cart">Items in cart: <span id="items">0</span></div>
      <div class="flex items-center gap-x-6">
        <div>
          <img class="w-12 h-12 rounded-full" src="<https://picsum.photos/200/200>" alt="lorem picsum image" />
        </div>
        <div class="text-sm">
          <div class="font-semibold text-gray-900" id="user-name">Tobias Fors</div>
          <div class="mt-1 text-gray-600" id="user-title">CEO, Utvecklarakademin</div>
        </div>
      </div>

      <div class="bg-white">
        <div class="max-w-2xl px-4 py-16 mx-auto sm:py-24 sm:px-6 lg:max-w-7xl lg:px-8">
          <h2 class="text-2xl font-bold tracking-tight text-gray-900">Customers also purchased</h2>
          <div class="grid grid-cols-1 mt-6 gap-y-10 gap-x-6 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8" id="product-grid">
            <!-- Products will be rendered here -->
          </div>
        </div>
        <button id="buy" class="p-4 bg-green-500 text-white border-2 rounded hover:bg-green-600">Add to cart</button>
        <button id="remove" class="p-4 bg-red-500 text-white border-2 rounded hover:bg-red-600">Remove from cart</button>
      </div>
    </div>
    <script src="index.js" type="module"></script>
  </body>
</html>
